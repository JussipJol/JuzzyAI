name: Build

on:
  push:
    tags:
      - "v*"          # запускается только при git push с тегом v1.x.x

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output: juzzyai.exe
            artifact: juzzyai-windows.exe

          - os: macos-latest
            output: juzzyai
            artifact: juzzyai-macos

          - os: ubuntu-latest
            output: juzzyai
            artifact: juzzyai-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller rich cryptography textual

      - name: Build
        run: |
          pyinstaller juzzyai.spec

      - name: Rename artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: mv dist/juzzyai dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: mv dist\juzzyai.exe dist\${{ matrix.artifact }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}